name: Skill behavior bug
description: The skill installed, but Codex did not read or apply DESIGN.md correctly.
title: "Skill bug: "
labels: ["bug", "skill"]
body:
  - type: input
    id: codex
    attributes:
      label: Codex version
      placeholder: "If you know it"
  - type: input
    id: design-path
    attributes:
      label: Where is DESIGN.md?
      placeholder: "Repo root, docs/DESIGN.md, skills/design-system/references/DESIGN.md..."
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt used
      placeholder: "$design-system Make this page follow DESIGN.md."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should Codex have read, applied, or changed?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What did Codex do instead?"
    validations:
      required: true

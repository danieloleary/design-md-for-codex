name: Stay current

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-check:
    name: Skill and showcase drift check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run CI check
        shell: pwsh
        run: ./qa/ci-check.ps1

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Design Skill QA Fixture</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: Arial, sans-serif;
        color: #102044;
        background: linear-gradient(135deg, #5a7cff, #dfe7ff);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 56px 24px;
      }

      .card {
        padding: 36px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 30px 80px rgba(40, 80, 180, 0.28);
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(36px, 8vw, 72px);
        line-height: 0.95;
      }

      p {
        max-width: 620px;
        margin: 0 0 28px;
        font-size: 18px;
        line-height: 1.55;
      }

      button {
        min-height: 52px;
        padding: 0 24px;
        border: 0;
        border-radius: 999px;
        color: #ffffff;
        background: #4169e1;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Generic UI before DESIGN.md</h1>
        <p>This intentionally starts with a blue gradient, oversized rounded card, heavy shadow, and unrelated primary color. The design-system skill should move it toward the local DESIGN.md rules.</p>
        <button type="button">Primary action</button>
      </section>
    </main>
  </body>
</html>
